apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hello-world-python-netpol
  namespace: default
  labels:
    app: hello-world-python
spec:
  podSelector:
    matchLabels:
      app: hello-world-python
  policyTypes:
  - Ingress
  - Egress
  
  # Permissive ingress - allows all traffic including from Traefik
  ingress:
  - {}
  
  # Permissive egress - allows all outbound traffic
  egress:
  - {}

